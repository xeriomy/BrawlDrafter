name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

env:
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.caching=true -Dorg.gradle.parallel=true"
  JAVA_DISTRIBUTION: temurin
  JAVA_VERSION: "17"

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v5
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master' }}

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4
        with:
          api-level: 34
          build-tools: "34.0.0"
          ndk: false
          emulator: false

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      # Compile both modules first — fast feedback if there's a syntax error.
      - name: Compile
        run: ./gradlew compileDebugKotlin compileDebugJavaWithJavac

      # Unit tests — only debug variant (release tests just duplicate debug).
      - name: Unit tests
        run: ./gradlew testDebugUnitTest

      # Lint — only on PRs (slow, and abortOnError=false means it won't
      # fail the build anyway).
      - name: Lint
        if: github.event_name == 'pull_request'
        run: ./gradlew lintDebug

      # Assemble debug APK.
      - name: Assemble debug APK
        run: ./gradlew :app:assembleDebug

      # Rename APK with branch + SHA for traceability.
      - name: Rename APK
        run: |
          BRANCH="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          SHORT_SHA=$(git rev-parse --short HEAD)
          APK=$(find app/build/outputs/apk/debug -name '*.apk' -print -quit)
          mv "$APK" "app/build/outputs/apk/debug/BrawlDrafter-${BRANCH}-${SHORT_SHA}-debug.apk"

      # Report APK size.
      - name: APK size
        id: apk-size
        run: |
          APK=$(find app/build/outputs/apk/debug -name '*.apk' -print -quit)
          SIZE=$(du -h "$APK" | cut -f1)
          echo "size=$SIZE" >> "$GITHUB_OUTPUT"
          echo "## APK Size: \`$SIZE\`" >> "$GITHUB_STEP_SUMMARY"

      # Comment APK size on PRs so bloat is visible in the review.
      - name: Comment APK size on PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: apk-size
          message: |
            ## Debug APK
            | Metric | Value |
            |--------|-------|
            | **Size** | `${{ steps.apk-size.outputs.size }}` |
            | **Branch** | `${{ github.head_ref }}` |
            | **Commit** | `${{ github.sha }}` |

            Download the APK from the **Build & Test** workflow run artifacts.

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: BrawlDrafter-debug
          path: app/build/outputs/apk/debug/BrawlDrafter-*.apk
          if-no-files-found: error
          retention-days: 14
          compression-level: 0

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            **/build/reports/tests/**
            **/build/reports/lint-results-*.html
            **/build/reports/lint-results-*.xml
          if-no-files-found: ignore
          retention-days: 7